<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Destino | Guía Turística CR</title>
  <link rel="stylesheet" href="../css/global.css" />
  <style>
    /* Estilos para el video hero del destino seleccionado */
    .hero-bg-video {
      display: none;
      /* Oculto por defecto */
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 60vh;
      /* Altura de la sección superior */
      z-index: 0;
      /* Detrás del contenido pero sobre el fondo del body */
      overflow: hidden;
    }

    .hero-bg-video video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .hero-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      /* Overlay oscuro ligero para mejorar legibilidad */
      background: rgba(0, 0, 0, 0.2);
    }

    .hero-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 150px;
      /* Difuminado hacia el color de fondo del sitio para integrarlo */
      background: linear-gradient(to bottom, transparent, #f2f7f4);
    }

    /* Asegurar que el contenido principal quede sobre el video */
    .app-container {
      position: relative;
      z-index: 10;
    }
  </style>
</head>

<body>

  <!-- Contenedor del video (Se activa por JS dependiendo del destino) -->
  <div class="hero-bg-video" id="heroVideoContainer">
    <video id="heroVideoElement" autoplay loop muted playsinline></video>
    <div class="hero-overlay"></div>
    <div class="hero-fade"></div>
  </div>

  <app-header></app-header>

  <main class="app-container">
    <a class="volver" id="volverProvincia" href="../index.html">
      ← Volver a la provincia
    </a>

    <destino-detalle></destino-detalle>
  </main>

  <script type="module" src="../components/app-header.js"></script>
  <script type="module" src="../components/destino-detalle.js"></script>

  <script>
    const params = new URLSearchParams(window.location.search);
    const region = params.get("region");

    if (region) {
      document.getElementById("volverProvincia").href =
        `../provincia/?region=${encodeURIComponent(region)}`;
    }

    document.addEventListener("destino-cargado", (event) => {
      const video = event.detail.destino?.video;
      const container = document.getElementById("heroVideoContainer");
      const videoEl = document.getElementById("heroVideoElement");

      if (!video) {
        videoEl.removeAttribute("src");
        videoEl.load();
        container.style.display = "none";
        return;
      }

      videoEl.src = `../${video}`;
      container.style.display = "block";
    });
  </script>

</body>

</html>
